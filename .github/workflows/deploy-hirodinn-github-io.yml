# Builds this repo and pushes the production bundle to hirodinn/hirodinn.github.io (user site).
# Required repo secret: GH_PAGES_DEPLOY_TOKEN — a fine-grained or classic PAT with
# Contents: Read and write on hirodinn/hirodinn.github.io (and workflow scope if using fine-grained).
# Create at: GitHub → Settings → Developer settings → Personal access tokens.

name: Deploy to hirodinn.github.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      # GitHub Pages serves 404.html for unknown paths — helps client-side routing if you add routes later.
      - name: SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Deploy to hirodinn.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_DEPLOY_TOKEN }}
          external_repository: hirodinn/hirodinn.github.io
          publish_branch: main
          publish_dir: ./dist
          force_orphan: true
